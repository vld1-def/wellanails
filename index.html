<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-green: #34c759;
      --accent-red: #ff3b30;
      --accent-blue: #007aff;
      --accent-tip: #ffcc00;
      --btn-glass: rgba(255, 255, 255, 0.1);
    }

    html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #000; overflow: hidden; color: white; font-family: -apple-system, system-ui, sans-serif; }
    .liquid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; overflow: hidden; }
    .blob { position: absolute; width: 300px; height: 300px; background: var(--accent-blue); filter: blur(80px); border-radius: 50%; opacity: 0.3; animation: move 20s infinite alternate; }
    .blob-2 { background: #8e44ad; width: 400px; height: 400px; right: -100px; top: 10%; animation-duration: 25s; opacity: 0.2; }
    @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

    body { display: flex; flex-direction: column; background: transparent; }
    .header { text-align: center; padding-top: env(safe-area-inset-top); margin-top: 10px; flex-shrink: 0; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.9); }

    .dots { display: flex; justify-content: center; gap: 8px; margin: 8px 0 10px 0; flex-shrink: 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
    .dot.active { background: var(--accent-blue); transform: scale(1.4); }

    .swiper-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .swiper-container::-webkit-scrollbar { display: none; }
    .page { min-width: 100vw; max-width: 100vw; scroll-snap-align: start; box-sizing: border-box; padding: 0 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: block; }
    .page-content { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }

    .glass { background: var(--glass); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 18px; margin-bottom: 12px; box-sizing: border-box; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); }

    /* Статистика */
    .stats-grid { display: flex; justify-content: space-between; gap: 5px; }
    .stat-card { text-align: center; flex: 1; min-width: 0; }
    .stat-card .label { font-size: 18px; color: rgba(255,255,255,0.4); margin-bottom: 4px; display: block; }
    .stat-card .val { font-size: 20px; font-weight: 600; }
    .stat-row-net { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 12px; padding-top: 12px; }
    .net-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .net-main .label { font-size: 20px; color: white; }
    .net-main .val { font-size: 24px; font-weight: 700; }
    .stat-tips { display: flex; justify-content: space-between; align-items: center; color: var(--accent-tip); }
    .stat-tips .label { font-size: 18px; }
    .stat-tips .val { font-size: 22px; font-weight: 600; }

    .chart-container { height: 120px; margin-top: 5px; }

    /* ЗМЕНШЕНИЙ БЛОК ВВОДУ */
    .compact-form { padding: 14px !important; }
    .compact-form .input-row { margin-bottom: 8px; }
    .compact-form input, .compact-form .select-trigger { padding: 12px !important; margin-bottom: 8px !important; border-radius: 14px !important; font-size: 15px !important; }
    .compact-form .btn { padding: 14px !important; margin-top: 4px; }

    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; }

    input[type="number"], input[type="text"], .btn { width: 100%; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: white; box-sizing: border-box; outline: none; }
    .btn { border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; background: var(--btn-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .btn:active { transform: scale(0.96); }

    /* Архів */
    .archive-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .arc-info span { display: block; }
    .arc-month { font-size: 16px; font-weight: 600; }
    .arc-details { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .arc-net { font-size: 18px; font-weight: 700; }

    /* Історія */
    .history-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); align-items: center; }
    .h-info { display: flex; flex-direction: column; flex: 1; }
    .h-date { font-size: 10px; color: rgba(255,255,255,0.3); }
    .h-comm { font-size: 14px; color: #eee; }
    .h-actions { display: flex; align-items: center; gap: 8px; }
    .h-amount { font-weight: 600; font-size: 14px; text-align: right; white-space: nowrap; }
    .btn-icon { background: var(--btn-glass); border: 1px solid var(--glass-border); width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
    .icon-svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }

    .custom-select { position: relative; width: 100%; }
    .select-trigger { border-radius: 16px; background: var(--btn-glass); border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .select-options { position: absolute; top: 100%; left: 0; right: 0; background: rgba(20,20,20,0.95); backdrop-filter: blur(40px); border-radius: 18px; border: 1px solid var(--glass-border); display: none; z-index: 100; margin-top: 5px; overflow: hidden; }
    .select-options.show { display: block; }
    .select-option { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); display: none; justify-content: center; align-items: center; z-index: 2000; }
  </style>
</head>
<body>

  <div class="liquid-bg"><div class="blob"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
  <div class="header"><h1>Wella Nails</h1></div>
  <div class="dots"><div id="dot1" class="dot active"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div></div>

  <!-- MODAL EDIT -->
  <div id="editModal">
    <div class="glass compact-form" style="width: 92%;">
      <h3 style="margin-top:0; font-weight: 300; font-size: 16px;">РЕДАГУВАТИ</h3>
      <input type="hidden" id="editRow">
      <div class="custom-select" style="margin-bottom:8px">
        <div class="select-trigger" onclick="toggleEditDropdown()"><span id="selectedEditTypeText">💰 Прибуток</span><span>▼</span></div>
        <div id="editSelectOptions" class="select-options">
          <div class="select-option" onclick="selectEditType('Прибуток', '💰 Прибуток')">💰 Прибуток</div>
          <div class="select-option" onclick="selectEditType('Витрата', '💸 Витрата')">💸 Витрата</div>
        </div>
      </div>
      <input type="hidden" id="editTypeVal" value="Прибуток">
      <div class="input-row"><input type="number" id="editAmount" placeholder="Сума"><input type="number" id="editTip" placeholder="Чай"></div>
      <input type="number" id="editClients" placeholder="Кількість клієнтів">
      <input type="text" id="editComment" placeholder="Коментар">
      <div style="display:flex; gap:10px;"><button class="btn btn-inc" id="edit-save-btn" onclick="saveEdit()">Зберегти</button><button class="btn" style="background:rgba(255,255,255,0.05)" onclick="closeEdit()">Скасувати</button></div>
    </div>
  </div>

  <div class="swiper-container" id="swiper">
    <!-- PAGE 1: DASHBOARD -->
    <div class="page">
      <div class="page-content">
        <div class="glass">
          <div class="stats-grid">
            <div class="stat-card"><span class="label">Дохід</span><span class="val" id="m-inc" style="color:var(--accent-green)">0</span></div>
            <div class="stat-card"><span class="label">Витрати</span><span class="val" id="m-exp" style="color:var(--accent-red)">0</span></div>
            <div class="stat-card"><span class="label">ROI</span><span class="val" id="m-roi" style="color:var(--accent-blue)">0%</span></div>
            <div class="stat-card" style="text-align:right"><span class="label">Клієнти</span><span class="val" id="m-cli">0</span></div>
          </div>
          <div class="stat-row-net">
            <div class="net-main"><span class="label">Чистий дохід</span><span class="val" id="m-net">0 ₴</span></div>
            <div class="stat-tips"><span class="label">Чайові</span><span class="val" id="m-tips">0 ₴</span></div>
          </div>
        </div>
        <div class="glass" style="padding: 10px;"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>
        
        <!-- COMPACT INPUT BLOCK -->
        <div class="glass compact-form">
          <div class="custom-select" style="margin-bottom:8px">
            <div class="select-trigger" onclick="toggleDropdown()"><span id="selectedTypeText">💰 Прибуток</span><span>▼</span></div>
            <div id="selectOptions" class="select-options">
              <div class="select-option" onclick="selectType('Прибуток', '💰 Прибуток')">💰 Прибуток</div>
              <div class="select-option" onclick="selectType('Витрата', '💸 Витрата')">💸 Витрата</div>
            </div>
          </div>
          <div class="input-row"><input type="number" id="amount" placeholder="Сума (₴)" inputmode="decimal"><input type="number" id="tip" placeholder="Чай (₴)" inputmode="decimal"></div>
          <input type="number" id="clients" placeholder="Кількість клієнтів" inputmode="numeric">
          <input type="text" id="comment" placeholder="Коментар">
          <button class="btn btn-inc" id="submit-btn" onclick="sendData()">Зберегти прибуток</button>
        </div>
      </div>
    </div>

    <!-- PAGE 2: HISTORY -->
    <div class="page">
      <div class="page-content">
        <div class="glass">
          <h3 style="margin:0 0 10px 0; font-weight:300; font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px;">ОСТАННІ ОПЕРАЦІЇ</h3>
          <div id="history-list"></div>
        </div>
      </div>
    </div>

    <!-- PAGE 3: ARCHIVE -->
    <div class="page">
      <div class="page-content">
        <div class="glass">
          <h3 style="margin:0 0 10px 0; font-weight:300; font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px;">АРХІВ МІСЯЦІВ</h3>
          <div id="archive-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFQt7DwT6ywwhZsC6EIJSIGTyEyXBIVAr8GX70tRMkpce796kRQKSfXbWQz-mOUP_7/exec"; // ВСТАВТЕ СЮДИ URL!

    var myChart, lastData;
    const swiper = document.getElementById('swiper');
    const iconEdit = `<svg class="icon-svg" style="color:var(--accent-blue)" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
    const iconDelete = `<svg class="icon-svg" style="color:var(--accent-red)" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

    function loadData() {
      const script = document.createElement('script');
      script.src = `${SCRIPT_URL}?prefix=handleResponse&v=${Math.random()}`;
      document.body.appendChild(script);
      script.onload = () => document.body.removeChild(script);
    }

    function handleResponse(data) { updateUI(data); }

    async function sendToAPI(payload) {
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      setTimeout(loadData, 1500);
    }

    function updateUI(res) {
      if (!res || typeof res === 'string') return;
      lastData = res;
      const m = res.month;
      document.getElementById('m-inc').innerText = m.income;
      document.getElementById('m-exp').innerText = m.expense;
      document.getElementById('m-roi').innerText = m.roi + '%';
      document.getElementById('m-cli').innerText = m.clients;
      document.getElementById('m-tips').innerText = m.tips + ' ₴';
      const netEl = document.getElementById('m-net');
      netEl.innerText = m.net + ' ₴';
      netEl.style.color = m.net >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
      
      initChart(res.chart);
      
      // Рендеримо історію
      document.getElementById('history-list').innerHTML = res.history.map(item => `
        <div class="history-item">
          <div class="h-info"><span class="h-date">${item.date}</span><span class="h-comm">${item.comment || item.type}</span></div>
          <div class="h-actions">
            <div class="h-amount" style="color:${item.type==='Прибуток'?'var(--accent-green)':'var(--accent-red)'}">
              ${item.type==='Прибуток' ? item.amount + ' ₴ + ' + item.tip + ' ₴' : '- ' + item.amount + ' ₴'}
            </div>
            <button class="btn-icon" onclick="openEdit(${item.row})">${iconEdit}</button>
            <button class="btn-icon" onclick="deleteItem(${item.row})">${iconDelete}</button>
          </div>
        </div>`).join('');

      // Рендеримо архів
      document.getElementById('archive-list').innerHTML = res.archive.map(arc => `
        <div class="archive-item">
          <div class="arc-info">
            <span class="arc-month">${arc.label}</span>
            <span class="arc-details">Дохід: ${arc.income} | Клієнти: ${arc.clients}</span>
          </div>
          <div class="arc-net" style="color:${arc.net >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">
            ${arc.net} ₴
          </div>
        </div>`).join('');
    }

    // Решта функцій (Dropdown, swiper dots, initChart, sendData, etc.) залишаються майже без змін
    // Тільки додайте 3-тю точку в swiper listener:
    swiper.addEventListener('scroll', () => {
      const index = Math.round(swiper.scrollLeft / window.innerWidth);
      document.getElementById('dot1').classList.toggle('active', index === 0);
      document.getElementById('dot2').classList.toggle('active', index === 1);
      document.getElementById('dot3').classList.toggle('active', index === 2);
    });

    // ... (Всі інші функції з попереднього коду) ...
    // Не забудьте скопіювати clearForm, toggleDropdown, selectType, initChart, sendData, deleteItem, openEdit, saveEdit з попередньої версії.
    
    window.onload = loadData;
  </script>
</body>
</html>
