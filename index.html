<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wella Nails</title>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-green: #34c759;
      --accent-red: #ff3b30;
      --accent-blue: #007aff;
      --accent-tip: #ffcc00;
      --btn-glass: rgba(255, 255, 255, 0.1);
    }

    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100dvh; 
      background: #000; overflow: hidden; color: white; 
      font-family: -apple-system, system-ui, sans-serif;
    }

    /* ФОН РІДКОГО СКЛА */
    .liquid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: #000; overflow: hidden;
    }
    .blob {
      position: absolute; width: 300px; height: 300px;
      background: var(--accent-blue); filter: blur(80px);
      border-radius: 50%; opacity: 0.3; animation: move 20s infinite alternate;
    }
    .blob-2 { background: #8e44ad; width: 400px; height: 400px; right: -100px; top: 10%; animation-duration: 25s; opacity: 0.2; }
    .blob-3 { background: #2c3e50; width: 350px; height: 350px; left: -50px; bottom: 10%; animation-duration: 15s; opacity: 0.25; }

    @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

    body { display: flex; flex-direction: column; background: transparent; }

    .header { text-align: center; padding-top: env(safe-area-inset-top); margin-top: 10px; flex-shrink: 0; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.9); }

    .dots { display: flex; justify-content: center; gap: 8px; margin: 8px 0 10px 0; flex-shrink: 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
    .dot.active { background: var(--accent-blue); transform: scale(1.4); }

    .swiper-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .swiper-container::-webkit-scrollbar { display: none; }

    .page { min-width: 100vw; max-width: 100vw; scroll-snap-align: start; box-sizing: border-box; padding: 0 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: block; }
    .page-content { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }

    .glass { 
      background: var(--glass); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); 
      border: 1px solid var(--glass-border); border-radius: 28px; padding: 18px; 
      margin-bottom: 12px; box-sizing: border-box; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); 
    }

    /* СТАТИСТИКА */
    .stats-grid { display: flex; justify-content: space-between; gap: 5px; }
    .stat-card { text-align: center; flex: 1; min-width: 0; }
    .stat-card .label { font-size: 18px; color: rgba(255,255,255,0.4); margin-bottom: 4px; display: block; }
    .stat-card .val { font-size: 20px; font-weight: 600; }
    
    .stat-row-net { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 12px; padding-top: 12px; }
    .net-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .net-main .label { font-size: 20px; color: white; }
    .net-main .val { font-size: 24px; font-weight: 700; }
    .stat-tips { display: flex; justify-content: space-between; align-items: center; color: var(--accent-tip); }
    .stat-tips .label { font-size: 18px; }
    .stat-tips .val { font-size: 22px; font-weight: 600; }

    .chart-container { height: 130px; margin-top: 5px; }

    /* КНОПКИ ТА ІНПУТИ */
    .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .input-row input { flex: 1; margin-bottom: 0 !important; }

    input[type="number"], input[type="text"], .btn { 
      width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 16px; 
      border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); 
      color: white; font-size: 16px; box-sizing: border-box; outline: none; 
    }
    .btn { 
      border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; 
      background: var(--btn-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; }
    .btn-inc { background: rgba(52, 199, 89, 0.15); border: 1px solid rgba(52, 199, 89, 0.3); }
    .btn-exp { background: rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.3); }

    /* ІСТОРІЯ */
    .history-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); align-items: center; }
    .h-info { display: flex; flex-direction: column; flex: 1; }
    .h-date { font-size: 10px; color: rgba(255,255,255,0.3); }
    .h-comm { font-size: 14px; color: #eee; }
    .h-actions { display: flex; align-items: center; gap: 8px; }
    .h-amount { font-weight: 600; font-size: 14px; margin-right: 5px; text-align: right; white-space: nowrap; }

    .btn-icon { 
      background: var(--btn-glass); border: 1px solid var(--glass-border); width: 38px; height: 38px; 
      border-radius: 12px; display: flex; align-items: center; justify-content: center; 
      cursor: pointer; color: white; backdrop-filter: blur(10px); 
    }
    .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }
    .icon-edit { color: var(--accent-blue); }
    .icon-delete { color: var(--accent-red); }

    /* CUSTOM SELECT */
    .custom-select { position: relative; width: 100%; margin-bottom: 12px; }
    .select-trigger { padding: 14px; border-radius: 16px; background: var(--btn-glass); border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; backdrop-filter: blur(20px); }
    .select-options { position: absolute; top: 100%; left: 0; right: 0; background: rgba(20,20,20,0.95); backdrop-filter: blur(40px); border-radius: 18px; border: 1px solid var(--glass-border); display: none; z-index: 100; margin-top: 5px; overflow: hidden; }
    .select-options.show { display: block; }
    .select-option { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

    #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); display: none; justify-content: center; align-items: center; z-index: 2000; }
    
    /* СКРОЛБАР */
    .page::-webkit-scrollbar { width: 3px; }
    .page::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
  </style>
</head>
<body>

  <div class="liquid-bg">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="header"><h1>Wella Nails</h1></div>
  <div class="dots"><div id="dot1" class="dot active"></div><div id="dot2" class="dot"></div></div>

  <!-- MODAL EDIT -->
  <div id="editModal">
    <div class="glass" style="width: 92%;">
      <h3 style="margin-top:0; font-weight: 300;">РЕДАГУВАТИ</h3>
      <input type="hidden" id="editRow">
      <div class="custom-select">
        <div class="select-trigger" onclick="toggleEditDropdown()"><span id="selectedEditTypeText">💰 Прибуток</span><span>▼</span></div>
        <div class="select-options" id="editSelectOptions">
          <div class="select-option" onclick="selectEditType('Прибуток', '💰 Прибуток')">💰 Прибуток</div>
          <div class="select-option" onclick="selectEditType('Витрата', '💸 Витрата')">💸 Витрата</div>
        </div>
      </div>
      <input type="hidden" id="editTypeVal" value="Прибуток">
      <div class="input-row"><input type="number" id="editAmount" placeholder="Сума"><input type="number" id="editTip" placeholder="Чай"></div>
      <input type="number" id="editClients" placeholder="Кількість клієнтів">
      <input type="text" id="editComment" placeholder="Коментар">
      <div style="display:flex; gap:10px;">
        <button class="btn btn-inc" id="edit-save-btn" onclick="saveEdit()">Зберегти</button>
        <button class="btn" style="background:rgba(255,255,255,0.05)" onclick="closeEdit()">Скасувати</button>
      </div>
    </div>
  </div>

  <div class="swiper-container" id="swiper">
    <!-- СТОРІНКА 1 -->
    <div class="page">
      <div class="page-content">
        <div class="glass">
          <div class="stats-grid">
            <div class="stat-card"><span class="label">Дохід</span><span class="val" id="m-inc" style="color:var(--accent-green)">0</span></div>
            <div class="stat-card"><span class="label">Витрати</span><span class="val" id="m-exp" style="color:var(--accent-red)">0</span></div>
            <div class="stat-card"><span class="label">ROI</span><span class="val" id="m-roi" style="color:var(--accent-blue)">0%</span></div>
            <div class="stat-card" style="text-align:right"><span class="label">Клієнти</span><span class="val" id="m-cli">0</span></div>
          </div>
          <div class="stat-row-net">
            <div class="net-main"><span class="label">Чистий дохід</span><span class="val" id="m-net">0 ₴</span></div>
            <div class="stat-tips"><span class="label">Чайові</span><span class="val" id="m-tips">0 ₴</span></div>
          </div>
        </div>

        <div class="glass" style="padding: 10px;"><div class="chart-container"><canvas id="lineChart"></canvas></div></div>

        <div class="glass">
          <div class="custom-select">
            <div class="select-trigger" onclick="toggleDropdown()"><span id="selectedTypeText">💰 Прибуток</span><span>▼</span></div>
            <div class="select-options" id="selectOptions">
              <div class="select-option" onclick="selectType('Прибуток', '💰 Прибуток')">💰 Прибуток</div>
              <div class="select-option" onclick="selectType('Витрата', '💸 Витрата')">💸 Витрата</div>
            </div>
          </div>
          <div class="input-row">
            <input type="number" id="amount" placeholder="Сума (₴)" inputmode="decimal">
            <input type="number" id="tip" placeholder="Чай (₴)" inputmode="decimal">
          </div>
          <input type="number" id="clients" placeholder="Кількість клієнтів" inputmode="numeric">
          <input type="text" id="comment" placeholder="Коментар">
          <button class="btn btn-inc" id="submit-btn" onclick="sendData()">Зберегти прибуток</button>
        </div>
      </div>
    </div>

    <!-- СТОРІНКА 2 -->
    <div class="page">
      <div class="page-content">
        <div class="glass">
          <h3 style="margin:0 0 10px 0; font-weight:300; font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px;">ОСТАННІ ОПЕРАЦІЇ</h3>
          <div id="history-list">
            <div style="text-align:center; padding:20px; opacity:0.5;">Завантаження...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --------------------------------------------------------
    // ВСТАВТЕ ВАШЕ ПОСИЛАННЯ З GOOGLE APPS SCRIPT ТУТ:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFQt7DwT6ywwhZsC6EIJSIGTyEyXBIVAr8GX70tRMkpce796kRQKSfXbWQz-mOUP_7/exec";
    // --------------------------------------------------------

    var myChart, lastData;
    const swiper = document.getElementById('swiper');
    const iconEdit = `<svg class="icon-svg icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
    const iconDelete = `<svg class="icon-svg icon-delete" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

    async function callAPI(payload = null) {
      const options = {
        method: 'POST',
        body: JSON.stringify(payload || { action: 'get' }),
        mode: 'no-cors' // Google Script вимагає перенаправлення
      };

      // Оскільки Google Script при POST з no-cors не повертає тіло відповіді, 
      // ми використовуємо GET для отримання даних і POST для запису.
      if (!payload) {
        try {
          const res = await fetch(SCRIPT_URL);
          const data = await res.json();
          updateUI(data);
        } catch (e) { console.error("Fetch error:", e); }
      } else {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        // Після відправки робимо паузу 1 сек і оновлюємо дані через GET
        setTimeout(async () => {
          const res = await fetch(SCRIPT_URL);
          const data = await res.json();
          updateUI(data);
        }, 1000);
      }
    }

    function clearForm() {
      document.getElementById('amount').value = ''; document.getElementById('tip').value = ''; 
      document.getElementById('comment').value = ''; document.getElementById('clients').value = '';
      const btn = document.getElementById('submit-btn');
      btn.disabled = false;
      btn.innerText = document.getElementById('type').value === 'Прибуток' ? 'Зберегти прибуток' : 'Зберегти витрату';
    }

    function toggleDropdown() { document.getElementById('selectOptions').classList.toggle('show'); }
    function toggleEditDropdown() { document.getElementById('editSelectOptions').classList.toggle('show'); }

    function selectType(val, text) {
      document.getElementById('type').value = val;
      document.getElementById('selectedTypeText').innerText = text;
      document.getElementById('selectOptions').classList.remove('show');
      const btn = document.getElementById('submit-btn'), cli = document.getElementById('clients'), tip = document.getElementById('tip');
      if(val === 'Витрата') { 
        btn.className='btn btn-exp'; btn.innerText='Зберегти витрату'; cli.style.display='none'; tip.style.display='none';
      } else { 
        btn.className='btn btn-inc'; btn.innerText='Зберегти прибуток'; cli.style.display='block'; tip.style.display='block';
      }
    }

    function selectEditType(val, text) {
      document.getElementById('editTypeVal').value = val;
      document.getElementById('selectedEditTypeText').innerText = text;
      document.getElementById('editSelectOptions').classList.remove('show');
      document.getElementById('editClients').style.display = (val === 'Витрата') ? 'none' : 'block';
      document.getElementById('editTip').style.display = (val === 'Витрата') ? 'none' : 'block';
    }

    swiper.addEventListener('scroll', () => {
      const index = Math.round(swiper.scrollLeft / window.innerWidth);
      document.getElementById('dot1').classList.toggle('active', index === 0);
      document.getElementById('dot2').classList.toggle('active', index === 1);
    });

    function initChart(chartData) {
      const ctx = document.getElementById('lineChart').getContext('2d');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartData.labels,
          datasets: [
            { label: 'Дохід', data: chartData.inc, borderColor: '#34c759', tension: 0.4, pointRadius: 2, fill: false },
            { label: 'Витрати', data: chartData.exp, borderColor: '#ff3b30', tension: 0.4, pointRadius: 2, fill: false }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: 'rgba(255,255,255,0.3)', font: {size: 9} }, grid: { display: false } }, y: { display: false } } }
      });
    }

    function updateUI(res) {
      if (!res || typeof res === 'string') return;
      lastData = res;
      const m = res.month;
      document.getElementById('m-inc').innerText = m.income;
      document.getElementById('m-exp').innerText = m.expense;
      document.getElementById('m-roi').innerText = m.roi + '%';
      document.getElementById('m-cli').innerText = m.clients;
      document.getElementById('m-tips').innerText = m.tips + ' ₴';
      
      const netEl = document.getElementById('m-net');
      netEl.innerText = m.net + ' ₴';
      netEl.style.color = m.net >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
      
      initChart(res.chart);
      
      document.getElementById('history-list').innerHTML = res.history.map(item => `
        <div class="history-item">
          <div class="h-info">
            <span class="h-date">${item.date}</span>
            <span class="h-comm">${item.comment || item.type}</span>
          </div>
          <div class="h-actions">
            <div class="h-amount" style="color:${item.type==='Прибуток'?'var(--accent-green)':'var(--accent-red)'}">
              ${item.type==='Прибуток' ? item.amount + ' ₴ + ' + item.tip + ' ₴' : '- ' + item.amount + ' ₴'}
            </div>
            <button class="btn-icon icon-edit" onclick="openEdit(${item.row})">${iconEdit}</button>
            <button class="btn-icon icon-delete" onclick="deleteItem(${item.row})">${iconDelete}</button>
          </div>
        </div>`).join('');
    }

    function sendData() {
      const amount = document.getElementById('amount').value;
      if (!amount) return;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.innerText = 'Записую...';
      
      callAPI({
        action: 'add',
        type: document.getElementById('type').value, 
        amount: amount, 
        tip: document.getElementById('tip').value || 0,
        clients: document.getElementById('clients').value || 0, 
        comment: document.getElementById('comment').value || ""
      }).then(clearForm);
    }

    function deleteItem(row) { if (confirm("Видалити запис?")) callAPI({ action: 'delete', row: row }); }

    function openEdit(row) {
      const item = lastData.history.find(h => h.row === row);
      if (!item) return;
      document.getElementById('editRow').value = row;
      selectEditType(item.type, item.type === 'Прибуток' ? '💰 Прибуток' : '💸 Витрата');
      document.getElementById('editAmount').value = item.amount;
      document.getElementById('editTip').value = item.tip;
      document.getElementById('editClients').value = item.clients;
      document.getElementById('editComment').value = item.comment;
      document.getElementById('editModal').style.display = 'flex';
    }

    function saveEdit() {
      const btn = document.getElementById('edit-save-btn'); btn.disabled = true;
      callAPI({
        action: 'update',
        row: document.getElementById('editRow').value,
        type: document.getElementById('editTypeVal').value, 
        amount: document.getElementById('editAmount').value,
        tip: document.getElementById('editTip').value || 0, 
        clients: document.getElementById('editClients').value || 0, 
        comment: document.getElementById('editComment').value || ""
      }).then(() => {
        closeEdit();
        btn.disabled = false;
      });
    }

    function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

    window.onclick = function(e) { if (!e.target.closest('.custom-select')) { document.getElementById('selectOptions').classList.remove('show'); document.getElementById('editSelectOptions').classList.remove('show'); } }
    
    window.onload = () => { callAPI(); };
  </script>
  <input type="hidden" id="type" value="Прибуток">
</body>
</html>
